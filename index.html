<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Simulasi CAT CPNS Resmi</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f4f6f7;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            padding: 25px;
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .quiz-container {
            flex: 3;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            padding: 35px;
            box-sizing: border-box;
        }

        .sidebar-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        .welcome-card {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px 15px;
            margin: 20px 0;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .timer-box {
            background: #fdf2e9;
            border: 2px solid var(--warning-color);
            color: #d35400;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
            color: #7f8c8d;
        }

        .category-tag {
            background: #eaf2f8;
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .question-text {
            font-size: 19px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            background-color: #f2f4f4;
            border-color: #95a5a6;
        }

        .option-item.selected {
            background-color: #ebf5fb;
            border-color: var(--accent-color);
            font-weight: bold;
        }

        .option-item input {
            margin-right: 15px;
            transform: scale(1.3);
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .nav-num-btn {
            padding: 10px 0;
            background: #f4f6f7;
            border: 1.5px solid #bdc3c7;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .nav-num-btn:hover {
            background: #e5e8e8;
        }

        .nav-num-btn.answered {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .nav-num-btn.current {
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .footer-action {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button.btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-main { background: var(--primary-color); color: white; }
        .btn-main:hover { background: #34495e; }
        .btn-accent { background: var(--accent-color); color: white; }
        .btn-accent:hover { background: #1f618d; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-success:hover { background: #1e8449; }
        .btn-gray { background: #bdc3c7; color: #2c3e50; }
        .btn-gray:hover { background: #95a5a6; }

        .score-box {
            background: #e8f8f5;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
            border: 2px solid var(--success-color);
        }

        .review-card {
            background: #fff;
            border-left: 5px solid #bdc3c7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-radius: 0 8px 8px 0;
        }

        .review-card.correct-ans { border-left-color: var(--success-color); }
        .review-card.wrong-ans { border-left-color: var(--danger-color); }

        .explanation-box {
            margin-top: 15px;
            background: #f8f9f9;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 14.5px;
            border-left: 3px solid var(--warning-color);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            text-align: left;
        }
        .stats-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>

<div id="navbar-view" class="navbar" style="display: none;">
    <div id="nav-user-title">Peserta CAT: -</div>
    <div>SISTEM CAT ONLINE CPNS (Maksimal 150 Poin per Bab)</div>
</div>

<div id="app-root">
    <div class="welcome-card">
        <h2 style="color: var(--primary-color); margin-bottom: 5px;">Simulasi CAT CPNS Resmi</h2>
        <p style="color: #7f8c8d; font-size: 14px;">Waktu Tes Sesuai Ujian Asli: 100 Menit</p>
        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
        <label style="font-weight: bold; display: block; text-align: left;">Masukkan Nama Lengkap Anda:</label>
        <input type="text" id="username-input" placeholder="Contoh: Andi Wijaya" autocomplete="off">
        <button class="btn btn-success" style="width: 100%; padding: 14px;" onclick="initiateExam()">Mulai Ujian Sekarang</button>
    </div>
</div>

<script>
    let quizData = [];
    let currentQuestionIndex = 0;
    let userAnswers = {};
    let participantName = "";
    let timeLeft = 6000; 
    let examInterval;

    function initiateExam() {
        const nameInput = document.getElementById('username-input').value.trim();
        if(!nameInput) {
            alert('Silakan masukkan nama Anda terlebih dahulu sebelum memulai simulasi.');
            return;
        }
        participantName = nameInput;
        
        fetch('data_soal.json')
            .then(res => res.json())
            .then(data => {
                quizData = data;
                document.getElementById('navbar-view').style.display = 'flex';
                document.getElementById('nav-user-title').innerText = `Peserta: ${participantName}`;
                startCountdown();
                loadExamLayout();
            })
            .catch(err => {
                alert('Gagal memuat database data_soal.json. Pastikan file berada di folder yang sama.');
            });
    }

    function startCountdown() {
        examInterval = setInterval(() => {
            if(timeLeft <= 0) {
                clearInterval(examInterval);
                finishExam();
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const hr = Math.floor(timeLeft / 3600);
        const min = Math.floor((timeLeft % 3600) / 60);
        const sec = timeLeft % 60;
        const timerText = document.getElementById('timer-clock');
        if(timerText) {
            timerText.innerText = `${hr.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }
    }

    function loadExamLayout() {
        const root = document.getElementById('app-root');
        root.innerHTML = `
            <div class="main-wrapper">
                <div class="quiz-container" id="question-panel"></div>
                <div class="sidebar-container">
                    <div class="timer-box">
                        <div style="font-size: 12px; text-transform: uppercase;">Sisa Waktu Ujian</div>
                        <div id="timer-clock" style="font-size: 24px; margin-top: 5px;">01:40:00</div>
                    </div>
                    <h3 style="margin: 10px 0 5px 0; font-size: 16px; color: var(--primary-color);">Navigasi Nomor Soal</h3>
                    <div class="nav-grid" id="number-grid"></div>
                    <hr style="border:0; border-top: 1px solid #e5e7eb; margin: 10px 0;">
                    <button class="btn btn-success" style="width: 100%;" onclick="confirmFinish()">Selesai & Kumpulkan</button>
                </div>
            </div>
        `;
        renderQuestionPanel();
        renderNumberGrid();
        updateTimerDisplay();
    }

    function renderQuestionPanel() {
        const panel = document.getElementById('question-panel');
        const item = quizData[currentQuestionIndex];
        const chosen = userAnswers[currentQuestionIndex];

        let optionsHTML = "";
        for(const [key, val] of Object.entries(item.options)) {
            const isSelected = chosen === key ? 'selected' : '';
            const isChecked = chosen === key ? 'checked' : '';
            optionsHTML += `
                <div class="option-item ${isSelected}" onclick="pickAnswer('${key}')">
                    <input type="radio" name="options-group" value="${key}" ${isChecked}>
                    <span>${key}. ${val}</span>
                </div>
            `;
        }

        panel.innerHTML = `
            <div class="question-meta">
                <span class="category-tag">Kategori Modul: ${item.category}</span>
                <span>Butir Soal ${currentQuestionIndex + 1} / ${quizData.length}</span>
            </div>
            <div class="question-text">${item.question}</div>
            <div class="options-list">${optionsHTML}</div>
            <div class="footer-action">
                <button class="btn btn-gray" onclick="jumpToQuestion(${currentQuestionIndex - 1})" ${currentQuestionIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>Sebelumnya</button>
                <button class="btn btn-accent" onclick="jumpToQuestion(${currentQuestionIndex + 1})" ${currentQuestionIndex === quizData.length - 1 ? 'disabled style="opacity:0.5;"' : ''}>Selanjutnya</button>
            </div>
        `;
    }

    function renderNumberGrid() {
        const grid = document.getElementById('number-grid');
        grid.innerHTML = "";
        quizData.forEach((item, idx) => {
            let statusClass = "";
            if(userAnswers[idx]) statusClass += " answered";
            if(idx === currentQuestionIndex) statusClass += " current";

            grid.innerHTML += `
                <div class="nav-num-btn ${statusClass}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>
            `;
        });
    }

    function pickAnswer(letter) {
        userAnswers[currentQuestionIndex] = letter;
        renderQuestionPanel();
        renderNumberGrid();
    }

    function jumpToQuestion(idx) {
        if(idx >= 0 && idx < quizData.length) {
            currentQuestionIndex = idx;
            renderQuestionPanel();
            renderNumberGrid();
        }
    }

    function confirmFinish() {
        const totalAnswered = Object.keys(userAnswers).length;
        if(totalAnswered < quizData.length) {
            if(!confirm(`Anda baru menjawab ${totalAnswered} dari ${quizData.length} soal. Yakin ingin mengakhiri ujian?`)) return;
        } else {
            if(!confirm('Apakah Anda yakin seluruh jawaban sudah benar dan ingin mengumpulkan ujian?')) return;
        }
        finishExam();
    }

    function finishExam() {
        clearInterval(examInterval);
        const root = document.getElementById('app-root');
        
        let twkCorrect = 0, tiuCorrect = 0, tkpScore = 0;
        let totalTwk = 0, totalTiu = 0, totalTkp = 0;

        quizData.forEach((item, idx) => {
            const ans = userAnswers[idx];
            if(item.category === "TWK") {
                totalTwk++;
                if(ans === item.correct) twkCorrect++;
            } else if(item.category === "TIU") {
                totalTiu++;
                if(ans === item.correct) tiuCorrect++;
            } else if(item.category === "TKP") {
                totalTkp++;
                if(ans === item.correct) tkpScore += 5;
                else if(ans) tkpScore += 2;
            }
        });

        const twkFinalScore = twkCorrect * 5;
        const tiuFinalScore = tiuCorrect * 5;
        const cumulativeScore = twkFinalScore + tiuFinalScore + tkpScore;

        let reviewHTML = "";
        quizData.forEach((item, idx) => {
            const ans = userAnswers[idx] || "Tidak Dijawab";
            const isCorrect = ans === item.correct;
            let statusText = isCorrect ? "BENAR" : "SALAH";
            let cardClass = isCorrect ? "correct-ans" : "wrong-ans";

            if(item.category === "TKP") {
                statusText = ans === "Tidak Dijawab" ? "KOSONG" : "TERJAWAB (Poin Maksimum jika memilih " + item.correct + ")";
                cardClass = ans === item.correct ? "correct-ans" : "wrong-ans";
            }

            let optionsDetail = "";
            for(const [k, v] of Object.entries(item.options)) {
                let textWeight = k === item.correct ? 'style="font-weight:bold; color:var(--success-color);"' : '';
                optionsDetail += `<div ${textWeight}>${k}. ${v}</div>`;
            }

            reviewHTML += `
                <div class="review-card ${cardClass}">
                    <h4 style="margin: 0 0 10px 0; color: var(--primary-color);">Soal Nomor ${idx + 1} [${item.category}] - Status: ${statusText}</h4>
                    <p style="font-size: 15px; margin-bottom: 10px;">${item.question}</p>
                    <div style="font-size: 14px; padding-left: 10px; margin-bottom: 10px; border-left: 2px solid #ddd;">
                        ${optionsDetail}
                    </div>
                    <p style="font-size: 14px; margin: 5px 0;"><strong>Jawaban Anda:</strong> ${ans}</p>
                    <p style="font-size: 14px; margin: 5px 0; color: var(--success-color);"><strong>Kunci Jawaban Resmi:</strong> ${item.correct}</p>
                    <div class="explanation-box">
                        <strong>Pembahasan Analisis:</strong><br>${item.explanation || 'Berdasarkan materi resmi kisi-kisi BKN.'}
                    </div>
                </div>
            `;
        });

        root.innerHTML = `
            <div style="max-width: 1000px; margin: 40px auto; padding: 20px; box-sizing: border-box;">
                <div class="score-box">
                    <h2 style="margin: 0 0 10px 0; color: var(--success-color);">Ujian Selesai! Dashboard Hasil ${participantName}</h2>
                    <div style="font-size: 48px; font-weight: bold; color: var(--primary-color); margin: 15px 0;">${cumulativeScore}</div>
                    <p style="font-size: 16px; font-weight: bold; color: #7f8c8d;">SKOR KUMULATIF SKD CAT</p>
                    
                    <table class="stats-table">
                        <tr style="background:#f4f6f7; font-weight:bold;">
                            <td style="padding:10px;">Kategori Tes</td>
                            <td style="padding:10px; text-align:center;">Jumlah Soal</td>
                            <td style="padding:10px; text-align:right;">Rincian Nilai Per Bab</td>
                        </tr>
                        <tr>
                            <td>Tes Wawasan Kebangsaan (TWK)</td>
                            <td style="text-align:center;">${totalTwk} Soal</td>
                            <td style="text-align:right; font-weight:bold; color:var(--accent-color);">${twkFinalScore} (Benar: ${twkCorrect})</td>
                        </tr>
                        <tr>
                            <td>Tes Inteligensia Umum (TIU)</td>
                            <td style="text-align:center;">${totalTiu} Soal</td>
                            <td style="text-align:right; font-weight:bold; color:var(--accent-color);">${tiuFinalScore} (Benar: ${tiuCorrect})</td>
                        </tr>
                        <tr>
                            <td>Tes Karakteristik Pribadi (TKP)</td>
                            <td style="text-align:center;">${totalTkp} Soal</td>
                            <td style="text-align:right; font-weight:bold; color:var(--accent-color);">${tkpScore} Poin</td>
                        </tr>
                    </table>
                </div>

                <h3 style="color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 8px; margin-bottom: 20px;">
                    Lembar Analisis & Pembahasan Soal Singkat
                </h3>
                <div>${reviewHTML}</div>
                
                <button class="btn btn-main" style="width:100%; padding:15px; margin-top:20px;" onclick="window.location.reload()">Kembali ke Halaman Utama</button>
            </div>
        `;
    }
</script>
</body>
</html>
