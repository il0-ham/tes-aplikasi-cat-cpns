<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CAT CPNS - Database Terpisah</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 22px;
        }

        .timer {
            background: #e8f8f5;
            color: var(--accent-color);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 15px;
            border: 1px solid var(--accent-color);
        }

        .quiz-body {
            margin-bottom: 30px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 22px;
            font-weight: 500;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #fffff;
        }

        .option-item:hover {
            background-color: #eafaf1;
            border-color: var(--accent-color);
        }

        .option-item.selected {
            background-color: #d5f5e3;
            border-color: var(--success-color);
            font-weight: bold;
        }

        .option-item input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }

        .footer-nav {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #bdc3c7;
            padding-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #34495e;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background-color: #2196f3;
        }

        .result-container {
            text-align: center;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #e8f8f5;
            border: 5px solid var(--success-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            color: var(--success-color);
            margin: 0 auto 20px;
        }

        .stats-table {
            width: 100%;
            margin: 25px 0;
            border-collapse: collapse;
        }

        .stats-table td {
            padding: 12px;
            border-bottom: 1px solid #bdc3c7;
            font-size: 16px;
        }

        .error-msg {
            color: var(--danger-color);
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <div style="text-align: center; padding: 40px;">
        <h3>Memuat Database Soal...</h3>
        <p>Pastikan file <code>data_soal.json</code> berada di folder yang sama.</p>
    </div>
</div>

<script>
    let quizData = [];
    let currentQuestionIndex = 0;
    let userAnswers = {};
    let timeLeft = 600; // 10 Menit waktu pengerjaan
    let timerInterval;
    const appContainer = document.getElementById('app-container');

    // Mengambil data dari file database terpisah (data_soal.json)
    fetch('data_soal.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Gagal memuat file data_soal.json');
            }
            return response.json();
        })
        .then(data => {
            quizData = data;
            if(quizData.length > 0) {
                startTimer();
                renderQuestion();
            } else {
                appContainer.innerHTML = '<p class="error-msg">Database soal kosong.</p>';
            }
        })
        .catch(error => {
            appContainer.innerHTML = `
                <div class="error-msg">
                    <p>Error: ${error.message}</p>
                    <p style="font-weight: normal; font-size: 14px; color: #555;">
                        Tips: Untuk alasan keamanan browser (CORS policy), file HTML yang membaca JSON lokal harus dijalankan menggunakan server lokal (seperti extension Live Server di VS Code) atau Anda bisa mengunggah keduanya ke hosting/GitHub Pages.
                    </p>
                </div>
            `;
        });

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const timerElement = document.getElementById('timer-display');
        if (timerElement) {
            timerElement.innerText = `Sisa Waktu: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }

    function renderQuestion() {
        const currentQuestion = quizData[currentQuestionIndex];
        const selectedAnswer = userAnswers[currentQuestionIndex];

        let optionsHTML = '';
        for (const [key, value] of Object.entries(currentQuestion.options)) {
            const isSelected = selectedAnswer === key ? 'selected' : '';
            const isChecked = selectedAnswer === key ? 'checked' : '';
            optionsHTML += `
                <div class="option-item ${isSelected}" onclick="selectOption('${key}')">
                    <input type="radio" name="question-${currentQuestionIndex}" value="${key}" ${isChecked}>
                    <span>${key}. ${value}</span>
                </div>
            `;
        }

        const isFirstQuestion = currentQuestionIndex === 0;
        const isLastQuestion = currentQuestionIndex === quizData.length - 1;

        appContainer.innerHTML = `
            <div class="header">
                <h2>Sistem CAT CPNS - Simulasi Multi-Kategori</h2>
                <div class="timer" id="timer-display">Sisa Waktu: --:--</div>
            </div>
            <div class="quiz-body">
                <div class="question-meta">
                    <span>Kategori: ${currentQuestion.category || 'SKD'}</span>
                    <span>Soal ${currentQuestionIndex + 1} dari ${quizData.length}</span>
                </div>
                <div class="question-text">${currentQuestion.question}</div>
                <div class="options-list">
                    ${optionsHTML}
                </div>
            </div>
            <div class="footer-nav">
                <button class="btn-secondary" onclick="prevQuestion()" ${isFirstQuestion ? 'style="visibility: hidden;"' : ''}>Sebelumnya</button>
                ${isLastQuestion ? 
                    `<button class="btn-success" onclick="submitQuiz()">Selesai Ujian</button>` : 
                    `<button class="btn-primary" onclick="nextQuestion()">Selanjutnya</button>`
                }
            </div>
        `;
        updateTimerDisplay();
    }

    function selectOption(key) {
        userAnswers[currentQuestionIndex] = key;
        renderQuestion();
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function submitQuiz() {
        clearInterval(timerInterval);
        let correctCount = 0;
        let wrongCount = 0;
        let uncompletedCount = 0;

        quizData.forEach((question, index) => {
            const answer = userAnswers[index];
            if (!answer) {
                uncompletedCount++;
            } else if (answer === question.correct) {
                correctCount++;
            } else {
                wrongCount++;
            }
        });

        const finalScore = correctCount * 5;

        appContainer.innerHTML = `
            <div class="result-container">
                <h2>Hasil Evaluasi Ujian CAT</h2>
                <div class="score-circle">${finalScore}</div>
                <p>Nilai Akhir Anda (Skor Maksimum: ${quizData.length * 5})</p>
                
                <table class="stats-table">
                    <tr>
                        <td><strong>Jawaban Benar</strong></td>
                        <td style="color: var(--success-color); text-align: right;"><strong>${correctCount} Soal</strong></td>
                    </tr>
                    <tr>
                        <td><strong>Jawaban Salah</strong></td>
                        <td style="color: var(--danger-color); text-align: right;"><strong>${wrongCount} Soal</strong></td>
                    </tr>
                    <tr>
                        <td><strong>Tidak Dijawab</strong></td>
                        <td style="color: #7f8c8d; text-align: right;"><strong>${uncompletedCount} Soal</strong></td>
                    </tr>
                </table>

                <button class="btn-primary" onclick="restartQuiz()" style="margin-top: 15px; width: 100%;">Ulangi Ujian</button>
            </div>
        `;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        userAnswers = {};
        timeLeft = 600;
        startTimer();
        renderQuestion();
    }
</script>

</body>
</html>
